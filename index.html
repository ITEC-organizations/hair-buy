<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Скупка волос — продай свои волосы дорого</title>
<meta name="description" content="Покупаем натуральные волосы. Оплата по граммам, наличными при получении. Отправь фото в WhatsApp.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fbf7f3;--cream:#f3e9e0;--ink:#2a211c;--muted:#7a6a5f;
    --gold:#b08458;--gold-deep:#8a6238;--wa:#25d366;--wa-deep:#1da851;
    --line:#e7dacd;--white:#ffffff;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:'Manrope',system-ui,sans-serif;background:var(--bg);color:var(--ink);
    line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  .wrap{max-width:1080px;margin:0 auto;padding:0 22px}
  h1,h2,h3{font-family:'Cormorant Garamond',serif;font-weight:600;line-height:1.12;letter-spacing:-.01em}

  .topbar{position:sticky;top:0;z-index:50;background:rgba(251,247,243,.85);
    backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .topbar .wrap{display:flex;align-items:center;justify-content:space-between;height:62px}
  .brand{display:flex;align-items:center;gap:11px}
  .brand .mark{width:42px;height:42px;flex:none}
  .brand .mark svg{width:100%;height:100%;display:block}
  .logo-txt{display:flex;flex-direction:column;line-height:1.04}
  .logo-txt b{font-weight:800;font-size:18px;letter-spacing:.05em;color:var(--ink)}
  .logo-txt b i{font-style:normal;color:var(--gold-deep);margin-inline-start:2px}
  .logo-txt small{font-size:9.5px;font-weight:700;letter-spacing:.04em;color:var(--muted);margin-top:1px}
  .lang{display:flex;gap:3px;background:var(--cream);border-radius:999px;padding:4px;flex-wrap:wrap;justify-content:flex-end}
  .lang button{border:none;background:transparent;cursor:pointer;font-family:inherit;
    font-weight:700;font-size:13px;color:var(--muted);padding:7px 12px;border-radius:999px;
    transition:.2s;letter-spacing:.02em}
  .lang button.active{background:var(--white);color:var(--ink);box-shadow:0 2px 8px rgba(0,0,0,.06)}

  .hero{position:relative;padding:64px 0 50px;text-align:center;overflow:hidden}
  .hero::before{content:"";position:absolute;inset:0;z-index:-1;
    background:radial-gradient(620px 360px at 50% -8%,rgba(176,132,88,.16),transparent 70%),
      radial-gradient(500px 300px at 88% 20%,rgba(176,132,88,.10),transparent 70%)}
  .eyebrow{display:inline-block;font-weight:700;font-size:12.5px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--gold-deep);background:var(--cream);
    padding:8px 16px;border-radius:999px;margin-bottom:20px}
  .hero h1{font-size:clamp(36px,7vw,64px);margin-bottom:16px}
  .hero h1 .hl{color:var(--gold-deep);font-style:italic}
  .hero p.sub{max-width:560px;margin:0 auto 30px;font-size:clamp(16px,2.4vw,19px);color:var(--muted)}
  .price-badge{display:inline-flex;align-items:baseline;gap:10px;background:var(--white);
    border:1px solid var(--line);border-radius:18px;padding:16px 26px;margin-bottom:30px;
    box-shadow:0 12px 40px rgba(138,98,56,.10)}
  .price-badge .num{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:700;color:var(--gold-deep);line-height:1}
  .price-badge .lbl{font-size:13px;color:var(--muted);font-weight:600;text-align:start}

  .btn-wa{display:inline-flex;align-items:center;gap:12px;background:var(--wa);color:#fff;
    text-decoration:none;font-weight:800;font-size:17px;padding:17px 32px;border-radius:999px;
    box-shadow:0 14px 34px rgba(37,211,102,.36);transition:transform .15s,box-shadow .15s}
  .btn-wa:hover{transform:translateY(-2px);box-shadow:0 18px 40px rgba(37,211,102,.45)}
  .btn-wa svg{width:24px;height:24px;flex:none}
  .hero .note{margin-top:14px;font-size:13.5px;color:var(--muted)}

  section.block{padding:54px 0}
  .sec-head{text-align:center;max-width:640px;margin:0 auto 38px}
  .sec-head h2{font-size:clamp(30px,5vw,46px);margin-bottom:12px}
  .sec-head p{color:var(--muted);font-size:16.5px}

  /* INSTRUCTIONS — what to send */
  .send{background:var(--cream)}
  .send-card{max-width:680px;margin:0 auto;background:var(--white);border:1px solid var(--line);
    border-radius:24px;padding:34px 30px;box-shadow:0 18px 50px rgba(138,98,56,.10)}
  .send-list{display:flex;flex-direction:column;gap:6px;margin-bottom:26px}
  .send-item{display:flex;align-items:center;gap:18px;padding:16px 6px;border-bottom:1px dashed var(--line)}
  .send-item:last-child{border-bottom:none}
  .send-item .ic{width:54px;height:54px;flex:none;border-radius:16px;background:var(--cream);
    display:grid;place-items:center;font-size:26px}
  .send-item .tx b{display:block;font-size:18px;font-family:'Cormorant Garamond',serif;font-weight:700}
  .send-item .tx span{font-size:14.5px;color:var(--muted)}
  .send-card .cashline{display:flex;align-items:center;gap:10px;justify-content:center;
    background:#eef9f0;border:1px solid #cdeed4;color:#1c7a39;border-radius:14px;
    padding:14px;font-weight:700;font-size:15px;margin-bottom:24px}
  .send-card .btn-wa{display:flex;justify-content:center;width:100%}

  /* HAIR COLORS gallery */
  .colors-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px}
  .swatch{background:var(--white);border:1px solid var(--line);border-radius:18px;
    padding:16px 8px 14px;text-align:center;transition:.2s}
  .swatch:hover{transform:translateY(-4px);box-shadow:0 14px 32px rgba(138,98,56,.12)}
  .swatch svg{width:100%;height:96px;display:block;margin-bottom:8px}
  .swatch .nm{font-weight:700;font-size:13.5px}
  .swatch .nm small{display:block;color:var(--muted);font-weight:500;font-size:11.5px;margin-top:2px}

  /* STYLES gallery */
  .styles-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .style{background:var(--white);border:1px solid var(--line);border-radius:20px;
    padding:22px 14px;text-align:center;transition:.2s}
  .style:hover{transform:translateY(-4px);box-shadow:0 14px 32px rgba(138,98,56,.12)}
  .style svg{width:100%;height:120px;margin-bottom:10px}
  .style .nm{font-weight:700;font-size:15px}

  /* Price */
  .ptable{max-width:560px;margin:0 auto;background:var(--white);border:1px solid var(--line);
    border-radius:22px;overflow:hidden;box-shadow:0 14px 44px rgba(138,98,56,.09)}
  .ptable .row{display:flex;justify-content:space-between;align-items:center;padding:20px 26px;border-bottom:1px solid var(--line)}
  .ptable .row:last-child{border-bottom:none}
  .ptable .row span:first-child{font-weight:600}
  .ptable .row .v{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--gold-deep)}
  .ptable .foot{background:var(--cream);padding:16px 26px;font-size:13.5px;color:var(--muted);text-align:center}

  .final{text-align:center;padding:64px 0 80px}
  .final h2{font-size:clamp(30px,5.4vw,50px);margin-bottom:14px}
  .final p{color:var(--muted);font-size:17px;max-width:520px;margin:0 auto 28px}

  .float-wa{position:fixed;right:20px;bottom:20px;z-index:60;display:flex;align-items:center;
    background:var(--wa);color:#fff;text-decoration:none;border-radius:999px;padding:15px;
    font-weight:800;box-shadow:0 10px 30px rgba(37,211,102,.45);transition:.2s}
  .float-wa svg{width:28px;height:28px;flex:none}
  .float-wa .ft{max-width:0;overflow:hidden;white-space:nowrap;transition:max-width .3s,margin .3s;font-size:15px}
  .float-wa:hover .ft{max-width:200px;margin-left:10px;margin-right:4px}

  footer{text-align:center;padding:30px 0 110px;color:var(--muted);font-size:13px;border-top:1px solid var(--line)}

  @media(max-width:860px){
    .colors-grid{grid-template-columns:repeat(3,1fr)}
    .styles-grid{grid-template-columns:repeat(2,1fr)}
  }
  @media(max-width:540px){
    .colors-grid{grid-template-columns:repeat(2,1fr)}
    .hero{padding:46px 0 40px}
    .send-card{padding:26px 18px}
    .send-item .ic{width:46px;height:46px;font-size:22px}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="wrap">
    <div class="brand">
      <span class="mark">
        <svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#dcb98f"/><stop offset="1" stop-color="#8a6238"/>
            </linearGradient>

          <rect x="2" y="2" width="40" height="40" rx="13" fill="url(#lg)"/>

            <path d="M12 10 C7 19,15 25,10 35"/>

            <path d="M22 10 C18 19,25 25,20 35"/>
          </g>

        <span data-i="cta"></span>
      </a>
    </div>
    <p class="note" data-i="note"></p>
  </div>
</header>

<!-- WHAT TO SEND -->
<section class="block send">
  <div class="wrap">
    <div class="sec-head">
      <h2 data-i="send_h"></h2>
      <p data-i="send_p"></p>
    </div>
    <div class="send-card">
      <div class="send-list">
        <div class="send-item"><div class="ic">📷</div><div class="tx"><b data-i="si1b"></b><span data-i="si1s"></span></div></div>

        <div class="send-item"><div class="ic">📍</div><div class="tx"><b data-i="si3b"></b><span data-i="si3s"></span></div></div>
        <div class="send-item"><div class="ic">⚖️</div><div class="tx"><b data-i="si4b"></b><span data-i="si4s"></span></div></div>

        <span data-i="cta"></span>
      </a>
    </div>
  </div>
</section>

<!-- HAIR COLORS -->
<section class="block">
  <div class="wrap">
    <div class="sec-head">
      <h2 data-i="col_h"></h2>
      <p data-i="col_p"></p>
    </div>
    <div class="colors-grid" id="colors"></div>
  </div>
</section>

<!-- HAIR STYLES -->
<section class="block send">
  <div class="wrap">
    <div class="sec-head">
      <h2 data-i="sty_h"></h2>
      <p data-i="sty_p"></p>
    </div>
    <div class="styles-grid" id="styles"></div>
  </div>
</section>

<!-- PRICE -->
<section class="block">
  <div class="wrap">
    <div class="sec-head">
      <h2 data-i="pr_h"></h2>
      <p data-i="pr_p"></p>
    </div>
    <div class="ptable">
      <div class="row"><span data-i="pr_r1"></span><span class="v">300–340 ₪</span></div>
      <div class="row"><span data-i="pr_r2"></span><span class="v">340–380 ₪</span></div>
      <div class="row"><span data-i="pr_r3"></span><span class="v">380–400 ₪</span></div>
      <div class="foot" data-i="pr_foot"></div>
    </div>
  </div>
</section>

<!-- FINAL -->
<section class="final">
  <div class="wrap">
    <h2 data-i="f_h"></h2>
    <p data-i="f_p"></p>
    <a class="btn-wa" data-wa href="#">
      <svg viewBox="0 0 32 32" fill="currentColor"><path d="M16 .5C7.4.5.5 7.4.5 16c0 2.8.7 5.4 2 7.7L.5 31.5l8-2.1c2.2 1.2 4.8 1.9 7.5 1.9 8.6 0 15.5-6.9 15.5-15.5S24.6.5 16 .5zm0 28c-2.4 0-4.7-.6-6.7-1.8l-.5-.3-4.8 1.3 1.3-4.7-.3-.5A12.4 12.4 0 0 1 3.5 16C3.5 9.1 9.1 3.5 16 3.5S28.5 9.1 28.5 16 22.9 28.5 16 28.5zm7-9.4c-.4-.2-2.3-1.1-2.6-1.3-.4-.1-.6-.2-.9.2s-1 1.3-1.2 1.5c-.2.2-.4.3-.8.1-.4-.2-1.6-.6-3.1-1.9-1.1-1-1.9-2.3-2.1-2.7-.2-.4 0-.6.2-.8l.6-.7c.2-.2.3-.4.4-.7.1-.2 0-.5 0-.7s-.9-2.1-1.2-2.9c-.3-.8-.6-.7-.9-.7h-.7c-.2 0-.6.1-1 .5-.3.4-1.3 1.3-1.3 3.1s1.3 3.6 1.5 3.8c.2.2 2.6 4 6.3 5.6.9.4 1.6.6 2.1.8.9.3 1.7.2 2.3.1.7-.1 2.3-.9 2.6-1.8.3-.9.3-1.7.2-1.8-.1-.2-.3-.3-.7-.5z"/></svg>

<footer><span data-i="foot"></span></footer>

  <svg viewBox="0 0 32 32" fill="currentColor"><path d="M16 .5C7.4.5.5 7.4.5 16c0 2.8.7 5.4 2 7.7L.5 31.5l8-2.1c2.2 1.2 4.8 1.9 7.5 1.9 8.6 0 15.5-6.9 15.5-15.5S24.6.5 16 .5zm0 28c-2.4 0-4.7-.6-6.7-1.8l-.5-.3-4.8 1.3 1.3-4.7-.3-.5A12.4 12.4 0 0 1 3.5 16C3.5 9.1 9.1 3.5 16 3.5S28.5 9.1 28.5 16 22.9 28.5 16 28.5zm7-9.4c-.4-.2-2.3-1.1-2.6-1.3-.4-.1-.6-.2-.9.2s-1 1.3-1.2 1.5c-.2.2-.4.3-.8.1-.4-.2-1.6-.6-3.1-1.9-1.1-1-1.9-2.3-2.1-2.7-.2-.4 0-.6.2-.8l.6-.7c.2-.2.3-.4.4-.7.1-.2 0-.5 0-.7s-.9-2.1-1.2-2.9c-.3-.8-.6-.7-.9-.7h-.7c-.2 0-.6.1-1 .5-.3.4-1.3 1.3-1.3 3.1s1.3 3.6 1.5 3.8c.2.2 2.6 4 6.3 5.6.9.4 1.6.6 2.1.8.9.3 1.7.2 2.3.1.7-.1 2.3-.9 2.6-1.8.3-.9.3-1.7.2-1.8-.1-.2-.3-.3-.7-.5z"/></svg>

<script>

/* lock SVG generator (flowing hair lock in a given color) */

  return `<svg viewBox="0 0 120 130" xmlns="http://www.w3.org/2000/svg">

    </g></svg>`;
}

  {c:"#d9b27a", ru:"Блонд",       uz:"Sariq (oqish)", zh:"金色",   hi:"सुनहरा",     ar:"أشقر"},
  {c:"#b6b1aa", ru:"Седой",       uz:"Oq soch",       zh:"白发",   hi:"सफ़ेद",      ar:"أبيض"},
];

const STYLES = [

function buildGalleries(l){
  document.getElementById('colors').innerHTML = COLORS.map(c=>
    `<div class="swatch">${lock(c.c)}<div class="nm">${c[l]}</div></div>`
  ).join('');
  document.getElementById('styles').innerHTML = STYLES.map(s=>
    `<div class="style">${s.svg}<div class="nm">${s[l]}</div></div>`
  ).join('');
}

let cur="ru";
function setLang(l){
  cur=l;
  document.documentElement.lang=l;
  document.documentElement.dir = (l==='ar') ? 'rtl' : 'ltr';
  document.querySelectorAll('[data-i]').forEach(el=>{
    const k=el.getAttribute('data-i');
    if(T[l][k]!==undefined) el.innerHTML=T[l][k];
  });
  document.querySelectorAll('.lang button').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));
  buildGalleries(l);
  const link="https://wa.me/"+PHONE+"?text="+encodeURIComponent(WA_MSG[l]);
  document.querySelectorAll('[data-wa]').forEach(a=>a.href=link);
}
